## SwiftLint configuration. Tightened from defaults but still pragmatic — these
## rules should fail CI on PRs but not block experimental local work.

included:
  - AllHandsOnDeck
  - AllHandsOnDeckTests

excluded:
  - "**/.build"
  - "**/Pods"
  - "**/DerivedData"
  - AllHandsOnDeck.xcodeproj

disabled_rules:
  - todo                           # WIP TODOs are useful in-tree
  - trailing_comma                 # SwiftUI builders read fine without
  - opening_brace                  # noisy on multi-line conditions
  - multiple_closures_with_trailing_closure  # SwiftUI gestures use this idiom
  - identifier_name                # 2-letter SwiftUI vars (vm, ns, ci) are intentional

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - last_where
  - sorted_first_last
  - toggle_bool
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - redundant_nil_coalescing
  - redundant_type_annotation
  - shorthand_optional_binding
  - prefer_self_in_static_references

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true
  ignores_function_declarations: true

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1200
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 3
  function_level: 4

force_cast: warning
force_try: warning
