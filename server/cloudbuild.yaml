# Cloud Build pipeline for the All Hands token / signaling server.
#
# Usage:
#   gcloud builds submit --config server/cloudbuild.yaml server/
#
# This builds, pushes, and deploys to Cloud Run in europe-west1. Secrets are
# read from Secret Manager at runtime — never baked into the image.
#
# Prereqs (one-time, see DEPLOY.md):
#   - Enable APIs: run, cloudbuild, secretmanager, artifactregistry
#   - Create secrets:    SUPABASE_SERVICE_ROLE_KEY, LIVEKIT_API_SECRET
#   - Grant the Cloud Run runtime service account `secretmanager.secretAccessor`
#     and the Cloud Build service account `run.admin` + `iam.serviceAccountUser`.

substitutions:
  _SERVICE: allhands-token
  _REGION: europe-west1
  _SUPABASE_URL: ''       # override at submit time: --substitutions=_SUPABASE_URL=https://xxx.supabase.co,...
  _LIVEKIT_API_KEY: ''
  _LIVEKIT_URL: ''

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE}:latest'
      - '.'

  - id: push
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_SERVICE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars=SUPABASE_URL=${_SUPABASE_URL},LIVEKIT_API_KEY=${_LIVEKIT_API_KEY},LIVEKIT_URL=${_LIVEKIT_URL}'
      - '--set-secrets=SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,LIVEKIT_API_SECRET=LIVEKIT_API_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
